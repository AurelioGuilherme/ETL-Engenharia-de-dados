services:
  postgres_warehouse:
    image: postgres:16
    environment:
      POSTGRES_USER: warehouse
      POSTGRES_PASSWORD: warehouse
      POSTGRES_DB: warehouse
    ports:
      - "5433:5432"
    volumes:
      - postgres_warehouse_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warehouse -d warehouse"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres_api:
    image: postgres:16
    environment:
      POSTGRES_USER: api
      POSTGRES_PASSWORD: api
      POSTGRES_DB: api
    ports:
      - "5434:5432"
    volumes:
      - postgres_api_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U api -d api"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  airflow-init:
    build:
      context: .
      dockerfile: infra/docker/airflow/Dockerfile
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://warehouse:warehouse@postgres_warehouse:5432/warehouse
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://warehouse:warehouse@postgres_warehouse:5432/warehouse
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
      AIRFLOW_UID: "50000"
      APP_LOG_LEVEL: INFO
      RUFF_CACHE_DIR: /tmp/ruff-cache
      SOURCE_XLSX_PATH: /opt/potatocore/Data/Lotofacil.xlsx
      WAREHOUSE_DB_HOST: postgres_warehouse
      WAREHOUSE_DB_PORT: "5432"
      WAREHOUSE_DB_NAME: warehouse
      WAREHOUSE_DB_USER: warehouse
      WAREHOUSE_DB_PASSWORD: warehouse
      API_DB_HOST: postgres_api
      API_DB_PORT: "5432"
      API_DB_NAME: api
      API_DB_USER: api
      API_DB_PASSWORD: api
      GOLD_SCHEMA: gold
      API_SCHEMA: public
      DBT_LOG_PATH: /tmp/dbt/logs
      DBT_TARGET_PATH: /tmp/dbt/target
      PYTHONPATH: /opt/potatocore/libs/core/src:/opt/potatocore/libs/ingestion/src:/opt/potatocore/apps/orchestrator/src
    command: >
      bash -c "airflow db migrate &&
      airflow users create --username airflow --firstname Air --lastname Flow --role Admin --email admin@example.com --password airflow || true"
    volumes:
      - .:/opt/potatocore
      - ./apps/orchestrator/src/potatocore/orchestrator/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    depends_on:
      postgres_warehouse:
        condition: service_healthy
      redis:
        condition: service_healthy

  airflow-webserver:
    build:
      context: .
      dockerfile: infra/docker/airflow/Dockerfile
    command: webserver
    environment: *airflow-env
    ports:
      - "8080:8080"
    volumes:
      - .:/opt/potatocore
      - ./apps/orchestrator/src/potatocore/orchestrator/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres_warehouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://localhost:8080/health', timeout=10).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  airflow-scheduler:
    build:
      context: .
      dockerfile: infra/docker/airflow/Dockerfile
    command: scheduler
    environment: *airflow-env
    volumes:
      - .:/opt/potatocore
      - ./apps/orchestrator/src/potatocore/orchestrator/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres_warehouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  airflow-worker:
    build:
      context: .
      dockerfile: infra/docker/airflow/Dockerfile
    command: celery worker
    environment: *airflow-env
    volumes:
      - .:/opt/potatocore
      - ./apps/orchestrator/src/potatocore/orchestrator/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres_warehouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  airflow-triggerer:
    build:
      context: .
      dockerfile: infra/docker/airflow/Dockerfile
    command: triggerer
    environment: *airflow-env
    volumes:
      - .:/opt/potatocore
      - ./apps/orchestrator/src/potatocore/orchestrator/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres_warehouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  dbt:
    build:
      context: .
      dockerfile: infra/docker/dbt/Dockerfile
    environment:
      WAREHOUSE_DB_HOST: postgres_warehouse
      WAREHOUSE_DB_PORT: "5432"
      WAREHOUSE_DB_NAME: warehouse
      WAREHOUSE_DB_USER: warehouse
      WAREHOUSE_DB_PASSWORD: warehouse
      DBT_LOG_PATH: /tmp/dbt/logs
      DBT_TARGET_PATH: /tmp/dbt/target
    volumes:
      - .:/opt/potatocore
    depends_on:
      postgres_warehouse:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: infra/docker/api/Dockerfile
    environment:
      APP_LOG_LEVEL: INFO
      API_DB_HOST: postgres_api
      API_DB_PORT: "5432"
      API_DB_NAME: api
      API_DB_USER: api
      API_DB_PASSWORD: api
      API_SCHEMA: public
      PYTHONPATH: /opt/potatocore/libs/core/src:/opt/potatocore/apps/api/src
    ports:
      - "8000:8000"
    volumes:
      - .:/opt/potatocore
    depends_on:
      postgres_api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://localhost:8000/health', timeout=10).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    restart: unless-stopped

volumes:
  postgres_warehouse_data:
  postgres_api_data:
  airflow_logs:

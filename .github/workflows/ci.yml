name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  docker-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images
        run: docker compose build airflow-webserver dbt api

      - name: Start dependencies
        run: docker compose up -d postgres_warehouse postgres_api redis

      - name: Lint and tests (docker only)
        run: |
          docker compose run --rm airflow-webserver bash -lc "ruff check libs apps tests && black --check libs apps tests && pytest -o cache_dir=/tmp/pytest-cache -q"

      - name: DAG parse check
        run: |
          docker compose run --rm airflow-webserver bash -lc "python -c \"import importlib; importlib.import_module('potatocore.orchestrator.dags.etl_lotofacil'); print('ok')\""

      - name: Run dbt parse/run/test
        run: |
          docker compose run --rm airflow-webserver bash -lc "python -c \"from potatocore.ingestion.bronze_loader import load_lotofacil_to_bronze; print(load_lotofacil_to_bronze())\" && python -c \"from potatocore.orchestrator.jobs.dbt_runner import run_dbt; run_dbt('deps'); run_dbt('run'); run_dbt('test')\""

      - name: API smoke
        run: |
          docker compose up -d api
          until curl --fail http://localhost:8000/health; do sleep 5; done

      - name: Shutdown stack
        if: always()
        run: docker compose down -v

potatocore_analytics:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('WAREHOUSE_DB_HOST', 'postgres_warehouse') }}"
      user: "{{ env_var('WAREHOUSE_DB_USER', 'warehouse') }}"
      password: "{{ env_var('WAREHOUSE_DB_PASSWORD', 'warehouse') }}"
      port: "{{ env_var('WAREHOUSE_DB_PORT', '5432') | int }}"
      dbname: "{{ env_var('WAREHOUSE_DB_NAME', 'warehouse') }}"
      schema: bronze
      threads: 4
